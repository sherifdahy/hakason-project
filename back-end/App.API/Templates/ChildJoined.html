<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your child joined!</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f9f1; font-family: 'Segoe UI', sans-serif;">
    <table width="100%" style="background-color:#f4f9f1;">
        <tr>
            <td align="center" style="padding: 30px 15px;">
                <table width="600" style="max-width:600px; background-color:#ffffff; border-radius:24px; box-shadow:0 6px 20px rgba(46, 125, 50, 0.12);">
                    <tr>
                        <td align="center" style="background: linear-gradient(135deg, #7CB342 0%, #4CAF50 100%); padding: 40px 20px; border-radius:24px 24px 0 0;">
                            <div style="font-size:64px;">🎉</div>
                            <h1 style="margin:14px 0 0 0; color:#ffffff; font-size:26px; font-weight:800;">Great News!</h1>
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="padding: 40px;">
                            <h2 style="color:#2E2E2E; font-size:24px; margin:0 0 16px 0;">
                                Hi <span style="color:#4CAF50;">{{parent_name}}</span>! 👋
                            </h2>
                            <p style="color:#5A6B5C; font-size:16px; line-height:1.6;">
                                <strong style="color:#4CAF50;">{{child_name}}</strong> just joined KidBridge AI using your invitation! 🌟
                            </p>
                            <p style="color:#5A6B5C; font-size:15px; line-height:1.6;">
                                You can now monitor their learning journey from your Parent Dashboard.
                            </p>
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="background-color:#F1F8E9; padding: 25px; border-radius:0 0 24px 24px;">
                            <p style="margin:0; color:#558B2F; font-size:14px; font-weight:600;">Made with 💚 by KidBridge AI</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
